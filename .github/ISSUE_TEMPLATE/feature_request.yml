name: "✨ 功能建议 · Feature Request"
description: "提出新功能或改进想法 / Suggest a new feature or improvement"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的想法！请帮助我们理解需求背后的真实场景。
        Thanks for the idea. Please help us understand the real scenario behind the request.
  - type: dropdown
    id: project
    attributes:
      label: 相关项目 · Project
      options:
        - Yaklang (语言/引擎 · language & engine)
        - Yakit (平台 · platform)
        - Memfit AI
        - HackSkills / HackBenchmark / RedHaze
        - 文档/官网 · Docs & Website
        - 其他 · Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 · The problem
      description: 你在什么场景下遇到了什么困难？ / What problem are you trying to solve?
      placeholder: 当我……的时候，我希望能够……，但现在……
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案 · Proposed solution
      description: 你希望它如何工作？ / How should it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 · Alternatives
      description: 你考虑过的其他做法或现有 workaround。 / Other approaches or workarounds you considered.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: 确认 · Confirmation
      options:
        - label: 我已搜索过现有 issue，确认这不是重复建议。 / I searched existing issues and this is not a duplicate.
          required: true
